<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{STORE_NAME}} - LinkToko</title>
  <meta name="description" content="{{TAGLINE}}" />
  <style>
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: #f7f4ec; color: #151722; }
    .wrap { width: min(720px, calc(100% - 28px)); margin: 0 auto; padding: 26px 0 60px; }
    .hero { text-align: center; padding: 36px 18px; border-radius: 32px; background: linear-gradient(135deg, {{BRAND_COLOR}}, #20d6b8); color: white; }
    .hero p { opacity: .82; }
    .logo { width: 78px; height: 78px; border-radius: 26px; background: rgba(255,255,255,.22); display: grid; place-items: center; margin: 0 auto 12px; font-weight: 900; }
    .grid { display: grid; gap: 12px; margin-top: 16px; }
    .product { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 18px; border-radius: 22px; background: white; box-shadow: 0 12px 34px rgba(21,23,34,.07); }
    .product span { color: #6b7080; }
    .cta { position: sticky; bottom: 14px; display: block; text-align: center; background: #151722; color: white; padding: 16px; border-radius: 999px; text-decoration: none; font-weight: 900; margin-top: 16px; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="logo">{{INITIALS}}</div>
      <h1>{{STORE_NAME}}</h1>
      <p>{{TAGLINE}}</p>
    </section>
    <section class="grid">
      <article class="product"><div><b>{{PRODUCT_1}}</b><br><span>Stok tersedia</span></div><strong>{{PRICE_1}}</strong></article>
      <article class="product"><div><b>{{PRODUCT_2}}</b><br><span>Stok tersedia</span></div><strong>{{PRICE_2}}</strong></article>
      <article class="product"><div><b>{{PRODUCT_3}}</b><br><span>Stok tersedia</span></div><strong>{{PRICE_3}}</strong></article>
    </section>
    <a class="cta" href="https://wa.me/{{WHATSAPP_NUMBER}}">Order via WhatsApp</a>
  </main>
</body>
</html>
